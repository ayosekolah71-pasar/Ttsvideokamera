<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Video Editor Pro - Fixed Audio Sync</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, 'Segoe UI', sans-serif; background: #0a0f1e; color: white; display: flex; justify-content: center; padding: 16px; margin: 0; }
        .container { background: #1a1f2e; padding: 20px; border-radius: 28px; width: 100%; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #00e5ff; margin: 0; }
        .sub { text-align: center; font-size: 12px; color: #88aaff; margin-bottom: 20px; }
        .label { font-weight: 600; margin: 12px 0 5px; font-size: 14px; color: #b9e6ff; }
        input[type="file"], textarea { width: 100%; border-radius: 16px; padding: 12px; background: #10131f; border: 1px solid #333; color: white; margin-bottom: 10px; }
        button { width: 100%; padding: 14px; background: #00e5ff; border: none; border-radius: 50px; font-weight: bold; font-size: 16px; color: #000; margin-top: 10px; cursor: pointer; }
        button:disabled { background: #555; opacity: 0.6; }
        .status { background: #0e1120; border-radius: 20px; padding: 10px; text-align: center; font-size: 12px; margin: 15px 0; border-left: 3px solid #00e5ff; }
        .row { display: flex; gap: 10px; margin: 10px 0; }
        .row button { margin: 0; flex: 1; background: #252c40; color: white; font-size: 13px; }
        .row button.active { background: #00e5ff; color: #000; }
        .camera-box { background: #000; border-radius: 20px; overflow: hidden; margin: 10px 0; }
        video { width: 100%; border-radius: 15px; background: #000; }
        .timeline-bar { background: #2a2f40; height: 10px; border-radius: 5px; position: relative; margin: 10px 0; overflow: hidden; }
        .video-progress { position: absolute; width: 2px; height: 100%; background: #ffaa33; }
        #outputArea { display: none; margin-top: 20px; padding-top: 10px; border-top: 1px solid #333; }
        .download-btn { display: block; width: 100%; background: #22c55e; text-align: center; padding: 15px; border-radius: 50px; text-decoration: none; color: white; font-weight: bold; margin-top: 10px; }
        .btn-danger { background: #dc2626 !important; color: white !important; }
        .btn-edit { background: #f59e0b !important; color: white !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎬 Video Editor Pro</h2>
    <div class="sub">Fix: Audio TTS Sync & Production</div>

    <div class="label">📹 Sumber Video</div>
    <div class="row">
        <button id="tabFile" class="active">📁 File</button>
        <button id="tabCamera">📷 Kamera Belakang</button>
    </div>

    <div id="fileArea">
        <input type="file" id="videoInput" accept="video/*">
    </div>

    <div id="cameraArea" style="display:none;">
        <div class="camera-box"><video id="camPreview" autoplay playsinline muted></video></div>
        <div id="camTimer" style="text-align:center; font-size:13px; color:#ffaa33;">Min 10s - Max 60s</div>
        <div class="row">
            <button id="startCamBtn" style="background:#22c55e; color:white;">🔴 Mulai Rekam</button>
            <button id="stopCamBtn" class="btn-danger" disabled>⏹️ Stop</button>
        </div>
    </div>

    <div id="previewArea" style="display:none;">
        <div class="label">👁️ Preview (Muted)</div>
        <video id="previewVideo" muted playsinline></video>
        <div class="row">
            <button id="playPreview">▶ Play/Pause</button>
            <button id="deleteVideoBtn" class="btn-danger">🗑️ Hapus Video</button>
        </div>
        <div class="timeline-bar"><div id="videoProgress" class="video-progress"></div></div>
    </div>

    <div class="label">🗣️ Teks Suara (TTS)</div>
    <textarea id="ttsText" rows="2" placeholder="Ketik kalimat..."></textarea>
    <button id="generateTTSBtn">🎤 Buat & Tes Suara</button>
    <div id="ttsStatus" class="status">TTS belum siap</div>

    <div class="label">✏️ Teks di Layar</div>
    <textarea id="overlayText" placeholder="Teks layar..."></textarea>
    <div class="row">
        <button id="posTop" class="active">Atas</button>
        <button id="posMid">Tengah</button>
        <button id="posBottom">Bawah</button>
    </div>

    <button id="processBtn" style="background:#ffaa33; margin-top:20px;" disabled>✨ PRODUKSI VIDEO (MP4) ✨</button>
    <div id="infoStatus" class="status">Siapkan video dan TTS.</div>

    <div id="outputArea">
        <video id="outputVideo" controls></video>
        <div class="row">
            <button id="editAgainBtn" class="btn-edit">✏️ Edit</button>
            <button id="resetAllBtn" class="btn-danger">🗑️ Ulang</button>
        </div>
        <a id="downloadLink" class="download-btn">💾 SIMPAN KE GALERI</a>
    </div>
</div>

<canvas id="mainCanvas" style="display:none;"></canvas>

<script>
    (function() {
        const videoInput = document.getElementById('videoInput');
        const previewVideo = document.getElementById('previewVideo');
        const previewArea = document.getElementById('previewArea');
        const ttsText = document.getElementById('ttsText');
        const generateTTSBtn = document.getElementById('generateTTSBtn');
        const ttsStatus = document.getElementById('ttsStatus');
        const overlayText = document.getElementById('overlayText');
        const processBtn = document.getElementById('processBtn');
        const infoStatus = document.getElementById('infoStatus');
        const outputArea = document.getElementById('outputArea');
        const outputVideo = document.getElementById('outputVideo');
        const downloadLink = document.getElementById('downloadLink');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        let selectedVideoFile = null, ttsAudioURL = null;
        let videoDuration = 0, textPos = 'top', camStream, camRecorder, camSec = 0, camInterval;

        // --- CAMERA ---
        document.getElementById('tabFile').onclick = () => { switchTab('file'); stopCam(); };
        document.getElementById('tabCamera').onclick = () => { switchTab('camera'); startCam(); };

        async function startCam() {
            try {
                camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
                document.getElementById('camPreview').srcObject = camStream;
            } catch (e) { alert("Kamera belakang error."); }
        }
        function stopCam() { if(camStream) camStream.getTracks().forEach(t=>t.stop()); }

        document.getElementById('startCamBtn').onclick = () => {
            const chunks = []; camSec = 0;
            camRecorder = new MediaRecorder(camStream);
            camRecorder.ondataavailable = e => chunks.push(e.data);
            camRecorder.onstop = () => {
                selectedVideoFile = new Blob(chunks, {type:'video/mp4'});
                loadPreview(URL.createObjectURL(selectedVideoFile));
            };
            camRecorder.start();
            document.getElementById('startCamBtn').disabled = true;
            document.getElementById('stopCamBtn').disabled = false;
            camInterval = setInterval(() => {
                camSec++; document.getElementById('camTimer').innerText = `Durasi: ${camSec}s`;
                if(camSec >= 60) document.getElementById('stopCamBtn').click();
            }, 1000);
        };

        document.getElementById('stopCamBtn').onclick = () => {
            if(camSec < 10) { alert("Min 10 detik"); return; }
            clearInterval(camInterval); camRecorder.stop();
            document.getElementById('startCamBtn').disabled = false;
            document.getElementById('stopCamBtn').disabled = true;
        };

        // --- PREVIEW ---
        videoInput.onchange = (e) => { if(e.target.files[0]) { selectedVideoFile = e.target.files[0]; loadPreview(URL.createObjectURL(selectedVideoFile)); } };
        function loadPreview(url) {
            previewVideo.src = url; previewArea.style.display = 'block';
            previewVideo.onloadedmetadata = () => { videoDuration = previewVideo.duration; checkReady(); };
        }
        document.getElementById('deleteVideoBtn').onclick = () => { selectedVideoFile = null; previewArea.style.display = 'none'; checkReady(); };

        // --- TTS SYSTEM (FIXED FOR PRODUCTION) ---
        generateTTSBtn.onclick = async () => {
            const txt = ttsText.value.trim();
            if(!txt) return;
            generateTTSBtn.disabled = true;
            ttsStatus.innerText = "🎤 Merekam audio sistem...";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const rec = new MediaRecorder(stream);
                const chunks = [];
                rec.ondataavailable = e => chunks.push(e.data);

                const utter = new SpeechSynthesisUtterance(txt);
                utter.lang = 'id-ID';
                
                utter.onstart = () => rec.start();
                utter.onend = () => {
                    setTimeout(() => {
                        rec.stop();
                        stream.getTracks().forEach(t => t.stop());
                    }, 700);
                };

                rec.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/mp3' });
                    if(ttsAudioURL) URL.revokeObjectURL(ttsAudioURL);
                    ttsAudioURL = URL.createObjectURL(blob);
                    ttsStatus.innerText = "✅ Suara Siap (Bisa didengar)";
                    generateTTSBtn.disabled = false;
                    checkReady();
                    // Playback test
                    new Audio(ttsAudioURL).play();
                };

                window.speechSynthesis.speak(utter);
            } catch (e) { alert("Butuh izin Mic"); generateTTSBtn.disabled = false; }
        };

        function checkReady() {
            processBtn.disabled = !(selectedVideoFile && ttsAudioURL);
            if(!processBtn.disabled) infoStatus.innerText = "✨ Siap Produksi!";
        }

        // --- PRODUCTION (FIXED AUDIO CONNECTION) ---
        processBtn.onclick = async () => {
            infoStatus.innerText = "🔄 Produksi Video + Audio... Mohon tunggu.";
            processBtn.disabled = true;

            const v = document.createElement('video');
            v.src = URL.createObjectURL(selectedVideoFile);
            v.muted = true;
            await v.play();

            const a = new Audio(ttsAudioURL);
            
            canvas.width = v.videoWidth; canvas.height = v.videoHeight;
            const videoStream = canvas.captureStream(25);
            
            // Audio Mixing Logic
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const dest = audioCtx.createMediaStreamDestination();
            const source = audioCtx.createMediaElementSource(a);
            source.connect(dest);
            source.connect(audioCtx.destination); // Supaya terdengar saat proses

            const combined = new MediaStream([
                ...videoStream.getVideoTracks(),
                ...dest.stream.getAudioTracks()
            ]);

            let mime = 'video/mp4;codecs=avc1';
            if(!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm';

            const recorder = new MediaRecorder(combined, { mimeType: mime, videoBitsPerSecond: 2500000 });
            const finalChunks = [];
            
            recorder.ondataavailable = e => finalChunks.push(e.data);
            
            recorder.onstop = () => {
                const finalBlob = new Blob(finalChunks, { type: mime });
                outputVideo.src = URL.createObjectURL(finalBlob);
                downloadLink.href = outputVideo.src;
                downloadLink.download = "video_final_wa.mp4";
                outputArea.style.display = 'block';
                infoStatus.innerText = "✅ Berhasil!";
                processBtn.disabled = false;
            };

            recorder.start();
            a.play(); // Mulai audio TTS tepat saat rekaman mulai

            const draw = () => {
                if(v.ended || v.paused) { 
                    recorder.stop(); 
                    a.pause();
                    return; 
                }
                ctx.drawImage(v, 0, 0, canvas.width, canvas.height);
                const txt = overlayText.value;
                if(txt) {
                    ctx.fillStyle = "white"; ctx.font = `bold ${canvas.height * 0.07}px sans-serif`;
                    ctx.textAlign = "center"; ctx.shadowColor = "black"; ctx.shadowBlur = 8;
                    let y = 60;
                    if(textPos === 'middle') y = canvas.height/2;
                    if(textPos === 'bottom') y = canvas.height-60;
                    ctx.fillText(txt, canvas.width/2, y);
                }
                requestAnimationFrame(draw);
            };
            draw();
        };

        // UI Helpers
        function switchTab(t) {
            document.getElementById('fileArea').style.display = t==='file'?'block':'none';
            document.getElementById('cameraArea').style.display = t==='camera'?'block':'none';
            document.getElementById('tabFile').className = t==='file'?'active':'';
            document.getElementById('tabCamera').className = t==='camera'?'active':'';
        }
        document.getElementById('playPreview').onclick = () => previewVideo.paused ? previewVideo.play() : previewVideo.pause();
        previewVideo.ontimeupdate = () => document.getElementById('videoProgress').style.left = (previewVideo.currentTime/videoDuration*100)+'%';
        document.getElementById('posTop').onclick = () => { textPos='top'; setPosUI('posTop'); };
        document.getElementById('posMid').onclick = () => { textPos='middle'; setPosUI('posMid'); };
        document.getElementById('posBottom').onclick = () => { textPos='bottom'; setPosUI('posBottom'); };
        function setPosUI(id) { ['posTop','posMid','posBottom'].forEach(i=>document.getElementById(i).classList.remove('active')); document.getElementById(id).classList.add('active'); }
        document.getElementById('editAgainBtn').onclick = () => { outputArea.style.display='none'; infoStatus.innerText="Mode Edit aktif."; };
        document.getElementById('resetAllBtn').onclick = () => { if(confirm("Ulang semua?")) location.reload(); };
    })();
</script>
</body>
</html>
