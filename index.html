<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Video Editor Pro - Full Features</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, 'Segoe UI', sans-serif; background: #0a0f1e; color: white; display: flex; justify-content: center; padding: 16px; margin: 0; }
        .container { background: #1a1f2e; padding: 20px; border-radius: 28px; width: 100%; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #00e5ff; margin: 0; }
        .sub { text-align: center; font-size: 12px; color: #88aaff; margin-bottom: 20px; }
        .label { font-weight: 600; margin: 12px 0 5px; font-size: 14px; color: #b9e6ff; }
        input[type="file"], textarea, select { width: 100%; border-radius: 16px; padding: 12px; background: #10131f; border: 1px solid #333; color: white; margin-bottom: 10px; }
        button { width: 100%; padding: 14px; background: #00e5ff; border: none; border-radius: 50px; font-weight: bold; font-size: 16px; color: #000; margin-top: 10px; cursor: pointer; }
        button:disabled { background: #555; opacity: 0.6; }
        .status { background: #0e1120; border-radius: 20px; padding: 10px; text-align: center; font-size: 12px; margin: 15px 0; border-left: 3px solid #00e5ff; }
        .row { display: flex; gap: 10px; margin: 10px 0; }
        .row button { margin: 0; flex: 1; background: #252c40; color: white; font-size: 13px; }
        .row button.active { background: #00e5ff; color: #000; }
        .camera-box { background: #000; border-radius: 20px; overflow: hidden; margin: 10px 0; position: relative; }
        video { width: 100%; border-radius: 15px; background: #000; display: block; }
        .timeline-bar { background: #2a2f40; height: 40px; border-radius: 10px; position: relative; margin-bottom: 10px; overflow: hidden; }
        .video-progress { position: absolute; width: 2px; height: 100%; background: #ffaa33; z-index: 10; }
        #outputArea { display: none; margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; }
        .download-btn { display: block; width: 100%; background: #22c55e; text-align: center; padding: 15px; border-radius: 50px; text-decoration: none; color: white; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎬 Video Editor Pro</h2>
    <div class="sub">V2: Kamera + File Manager + Mute</div>

    <div class="label">📹 Sumber Video</div>
    <div class="row">
        <button id="tabFile" class="active">📁 File Manager</button>
        <button id="tabCamera">📷 Kamera</button>
    </div>

    <div id="fileArea">
        <input type="file" id="videoInput" accept="video/*">
    </div>

    <div id="cameraArea" style="display:none;">
        <div class="camera-box">
            <video id="camPreview" autoplay playsinline muted></video>
        </div>
        <div id="camTimer" style="text-align:center; font-size:14px; color:#ffaa33; margin-bottom:5px;">Durasi: 0s (Min 10s)</div>
        <div class="row">
            <button id="startCamBtn" style="background:#22c55e; color:white;">🔴 Mulai Rekam</button>
            <button id="stopCamBtn" style="background:#dc2626; color:white;" disabled>⏹️ Berhenti</button>
        </div>
    </div>

    <div id="previewArea" style="display:none; margin-top:15px;">
        <div class="label">👁️ Preview (Muted)</div>
        <video id="previewVideo" muted playsinline></video>
        <div class="row">
            <button id="playPreview">▶ Play/Pause</button>
            <span id="timeDisplay" style="font-size:12px; align-self:center;">0s / 0s</span>
        </div>
    </div>

    <div class="label">🗣️ Teks Suara (TTS)</div>
    <textarea id="ttsText" rows="2" placeholder="Ketik kata-kata..."></textarea>
    <button id="generateTTSBtn">🎤 Buat Suara TTS</button>
    <div id="ttsStatus" class="status">TTS belum siap</div>

    <div class="label">✏️ Teks di Layar</div>
    <textarea id="overlayText" placeholder="Teks layar..."></textarea>
    <div class="row">
        <button id="posTop" class="active">Atas</button>
        <button id="posMid">Tengah</button>
        <button id="posBottom">Bawah</button>
    </div>

    <div class="label">🎚️ Timeline</div>
    <div class="timeline-bar">
        <div id="videoProgress" class="video-progress"></div>
    </div>

    <button id="processBtn" style="background:#ffaa33;" disabled>✨ PRODUKSI VIDEO (MP4) ✨</button>
    <div id="infoStatus" class="status">Siapkan bahan...</div>

    <div id="outputArea">
        <video id="outputVideo" controls></video>
        <a id="downloadLink" class="download-btn">💾 SIMPAN KE GALERI (WA)</a>
    </div>
</div>

<canvas id="mainCanvas" style="display:none;"></canvas>

<script>
    (function() {
        const videoInput = document.getElementById('videoInput');
        const previewVideo = document.getElementById('previewVideo');
        const previewArea = document.getElementById('previewArea');
        const ttsText = document.getElementById('ttsText');
        const generateTTSBtn = document.getElementById('generateTTSBtn');
        const ttsStatus = document.getElementById('ttsStatus');
        const overlayText = document.getElementById('overlayText');
        const processBtn = document.getElementById('processBtn');
        const infoStatus = document.getElementById('infoStatus');
        const outputArea = document.getElementById('outputArea');
        const outputVideo = document.getElementById('outputVideo');
        const downloadLink = document.getElementById('downloadLink');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');

        // Kamera Elements
        const camPreview = document.getElementById('camPreview');
        const startCamBtn = document.getElementById('startCamBtn');
        const stopCamBtn = document.getElementById('stopCamBtn');
        const camTimer = document.getElementById('camTimer');

        let selectedVideoFile = null;
        let selectedAudioBlob = null;
        let videoDuration = 0;
        let textPos = 'top';
        let camRecorder, camStream, camChunks = [], camInterval;
        let camSec = 0;

        // --- TAB SWITCHING ---
        document.getElementById('tabFile').onclick = () => {
            toggleTab('file');
            stopCameraStream();
        };
        document.getElementById('tabCamera').onclick = () => {
            toggleTab('camera');
            initCamera();
        };

        function toggleTab(type) {
            document.getElementById('fileArea').style.display = type === 'file' ? 'block' : 'none';
            document.getElementById('cameraArea').style.display = type === 'camera' ? 'block' : 'none';
            document.getElementById('tabFile').className = type === 'file' ? 'active' : '';
            document.getElementById('tabCamera').className = type === 'camera' ? 'active' : '';
        }

        // --- CAMERA LOGIC ---
        async function initCamera() {
            try {
                camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                camPreview.srcObject = camStream;
            } catch (e) { alert("Gagal akses kamera: " + e); }
        }

        function stopCameraStream() {
            if (camStream) camStream.getTracks().forEach(t => t.stop());
        }

        startCamBtn.onclick = () => {
            camChunks = [];
            camSec = 0;
            camRecorder = new MediaRecorder(camStream);
            camRecorder.ondataavailable = e => camChunks.push(e.data);
            camRecorder.onstop = () => {
                const blob = new Blob(camChunks, { type: 'video/mp4' });
                selectedVideoFile = blob;
                loadVideoToPreview(URL.createObjectURL(blob));
            };
            camRecorder.start();
            startCamBtn.disabled = true;
            stopCamBtn.disabled = false;
            camInterval = setInterval(() => {
                camSec++;
                camTimer.innerText = `Durasi: ${camSec}s (Max 60s)`;
                if (camSec >= 60) stopCamBtn.click();
            }, 1000);
        };

        stopCamBtn.onclick = () => {
            if (camSec < 10) {
                alert("Minimal durasi 10 detik!");
                return;
            }
            clearInterval(camInterval);
            camRecorder.stop();
            startCamBtn.disabled = false;
            stopCamBtn.disabled = true;
            camTimer.innerText = `Selesai: ${camSec}s`;
        };

        // --- FILE & PREVIEW ---
        videoInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedVideoFile = file;
                loadVideoToPreview(URL.createObjectURL(file));
            }
        };

        function loadVideoToPreview(url) {
            previewVideo.src = url;
            previewArea.style.display = 'block';
            previewVideo.onloadedmetadata = () => {
                videoDuration = previewVideo.duration;
                document.getElementById('timeDisplay').innerText = `0s / ${videoDuration.toFixed(1)}s`;
                checkReady();
            };
        }

        document.getElementById('playPreview').onclick = () => {
            previewVideo.paused ? previewVideo.play() : previewVideo.pause();
        };

        previewVideo.ontimeupdate = () => {
            document.getElementById('videoProgress').style.left = (previewVideo.currentTime / videoDuration * 100) + '%';
        };

        // --- TTS LOGIC ---
        generateTTSBtn.onclick = async () => {
            const txt = ttsText.value.trim();
            if (!txt) return;
            generateTTSBtn.disabled = true;
            ttsStatus.innerText = "🎤 Merekam TTS...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const rec = new MediaRecorder(stream);
                const chunks = [];
                rec.ondataavailable = e => chunks.push(e.data);
                const utter = new SpeechSynthesisUtterance(txt);
                utter.lang = 'id-ID';
                utter.onstart = () => rec.start();
                utter.onend = () => {
                    setTimeout(() => {
                        rec.stop();
                        stream.getTracks().forEach(t => t.stop());
                    }, 500);
                };
                rec.onstop = () => {
                    selectedAudioBlob = new Blob(chunks, { type: 'audio/mp3' });
                    ttsStatus.innerText = "✅ Suara Siap!";
                    generateTTSBtn.disabled = false;
                    checkReady();
                };
                speechSynthesis.speak(utter);
            } catch (e) { alert("Butuh izin Mic"); generateTTSBtn.disabled = false; }
        };

        function checkReady() {
            if (selectedVideoFile && selectedAudioBlob) {
                processBtn.disabled = false;
                infoStatus.innerText = "✨ Siap diproduksi!";
            }
        }

        // --- PRODUCTION ---
        processBtn.onclick = async () => {
            infoStatus.innerText = "🔄 Memproses... Video asli di-MUTE.";
            processBtn.disabled = true;
            
            const v = document.createElement('video');
            v.src = URL.createObjectURL(selectedVideoFile);
            v.muted = true; // MEMASTIKAN VIDEO ASLI MUTE
            await v.play();

            canvas.width = v.videoWidth;
            canvas.height = v.videoHeight;
            const stream = canvas.captureStream(25);
            
            const audioCtx = new AudioContext();
            const audioSource = audioCtx.createMediaElementSource(new Audio(URL.createObjectURL(selectedAudioBlob)));
            const dest = audioCtx.createMediaStreamDestination();
            audioSource.connect(dest);

            const combined = new MediaStream([...stream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
            let mime = 'video/mp4;codecs=avc1';
            if (!MediaRecorder.isTypeSupported(mime)) mime = 'video/webm';

            const recorder = new MediaRecorder(combined, { mimeType: mime, videoBitsPerSecond: 2500000 });
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.start();
            audioSource.mediaElement.play();

            const draw = () => {
                if (v.ended || v.paused) { recorder.stop(); return; }
                ctx.drawImage(v, 0, 0, canvas.width, canvas.height);
                const txt = overlayText.value;
                if (txt) {
                    ctx.fillStyle = "white";
                    ctx.font = `bold ${canvas.height * 0.07}px sans-serif`;
                    ctx.textAlign = "center";
                    ctx.shadowColor = "black"; ctx.shadowBlur = 8;
                    let y = 60;
                    if (textPos === 'middle') y = canvas.height / 2;
                    if (textPos === 'bottom') y = canvas.height - 60;
                    ctx.fillText(txt, canvas.width / 2, y);
                }
                requestAnimationFrame(draw);
            };
            draw();

            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: mime });
                outputVideo.src = URL.createObjectURL(blob);
                downloadLink.href = outputVideo.src;
                downloadLink.download = "video_final_wa.mp4";
                outputArea.style.display = 'block';
                infoStatus.innerText = "✅ Selesai! Video siap WhatsApp.";
                processBtn.disabled = false;
            };
        };

        // Posisi Teks
        document.getElementById('posTop').onclick = () => { textPos='top'; updatePosUI('posTop'); };
        document.getElementById('posMid').onclick = () => { textPos='middle'; updatePosUI('posMid'); };
        document.getElementById('posBottom').onclick = () => { textPos='bottom'; updatePosUI('posBottom'); };
        function updatePosUI(id){
            ['posTop','posMid','posBottom'].forEach(i=>document.getElementById(i).classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    })();
</script>
</body>
</html>
